name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      env:
        SPRING_DATASOURCE_URL: jdbc:mysql://${{secrets.PROD_DATABASE_URL}}/worldcountries
        SPRING_DATASOURCE_USERNAME: ${{secrets.PROD_DATABASE_USERNAME}}
        SPRING_DATASOURCE_PASSWORD: ${{secrets.PROD_DATABASE_PASSWORD}}
      run: mvn clean install

    - name: Upload Maven artifacts
      uses: actions/upload-artifact@v4
      with:
        name: maven-build
        path: target/*.jar